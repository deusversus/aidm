# IntentClassifier stub for a Bebop social beat — player turns to Jet
# and asks about Julia. Hand-authored; replace with a recorded capture
# once the real classifier's shape stabilizes.
id: bebop-intent-social-ask-jet
provider: anthropic
notes: |
  Matches any IntentClassifier invocation where the user is initiating
  a social interaction with Jet about Julia. Used by the Bebop
  scenario test suite's "ask Jet" turn.
match:
  system_includes:
    - "IntentClassifier"
  user_includes:
    - "Jet"
    - "Julia"
response:
  content:
    - type: text
      text: |
        {"intent":"SOCIAL","target":"Jet","action":"ask about Julia","epicness":0.4,"special_conditions":[],"confidence":0.92}
  stop_reason: end_turn
  usage:
    input_tokens: 1200
    output_tokens: 40
