        The board is a column of names on cheap LCD. Jinwoo's reads first. Underneath it, the next five — hunters who used to intimidate him two years ago, who now ask him to lunch.

        He reads it the way anyone reads a number they already know. Then he keeps walking.

        A receptionist at the desk lifts her eyes and lowers them again. Jinwoo catches the movement; doesn't call it out. The meeting room is to the left.

        Someone inside is already arguing about budget.
