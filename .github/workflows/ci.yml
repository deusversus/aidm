name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel only for PRs; master pushes should complete so required status
  # checks land on the final SHA even when rapid follow-up commits arrive.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      # The integration suite hits a real Postgres (no mocked DB in
      # integration tests — working agreement). pgvector image; the Railway
      # instance runs PostgreSQL 18.
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: aidm
          POSTGRES_PASSWORD: aidm
          POSTGRES_DB: aidm_v5_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://aidm:aidm@localhost:5432/aidm_v5_ci
    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up BEFORE setup-node so setup-node's pnpm cache works.
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm db:migrate
      - run: pnpm test
      # Deterministic eval gate only — LLM suites are skipped under --ci.
      - run: pnpm evals:ci
