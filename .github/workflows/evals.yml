name: evals

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

# This workflow runs the deterministic eval gate ONLY. No live LLM
# calls, no API keys. Every provider call routes through the MockLLM
# HTTP server the harness spins up programmatically + fixtures loaded
# from evals/fixtures/llm/gameplay/.
#
# The `--judge` flag (manual prose review via real Haiku) is never
# passed here and `evals/judge.ts` has an explicit CI guard that
# throws if process.env.CI === "true", so even an accidental flag
# addition would error safely instead of spending.

jobs:
  deterministic-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aidm
          POSTGRES_PASSWORD: aidm
          POSTGRES_DB: aidm_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://aidm:aidm@localhost:5432/aidm_eval
      AIDM_MOCK_LLM: "1"
      MOCKLLM_STRICT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm drizzle-kit migrate
      - run: pnpm evals:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evals-latest
          path: evals/latest.json
