services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: aidm
      POSTGRES_PASSWORD: aidm
      POSTGRES_DB: aidm
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidm"]
      interval: 5s
      timeout: 5s
      retries: 5

  aidm:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${AIDM_BIND_HOST:-127.0.0.1}:8000:8000"
    environment:
      - DATABASE_URL=postgresql://aidm:aidm@db:5432/aidm
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
      - ./src/profiles/catalog:/app/src/profiles/catalog
      # Persist settings (API keys, model config) across image rebuilds
      - ./settings.json:/app/settings.json

  # --- Self-hosted Langfuse (optional) ---
  # Start with: docker compose --profile langfuse up
  # Or use setup.sh which handles this automatically.
  langfuse-db:
    profiles: [langfuse]
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    profiles: [langfuse]
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-nextauth-secret-change-me
      SALT: local-salt-change-me
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

volumes:
  pgdata:
  langfuse_pgdata:
