services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aidm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidm
    ports:
      - "5432:5432"
    volumes:
      - aidm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aidm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aidm-pgdata:
