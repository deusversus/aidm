prose: >-
  The match catches on the first stroke.


  You don't remember losing the first one — there's a black sliver of spent wood in your palm you
  didn't put there — but this one flares clean, no wobble in it, and you touch it to the last
  cigarette in the pack before the flame has time to think about doing anything less than what you
  need it to do.


  The pack goes back in your pocket empty. You don't remark on it. Nobody does. It's just a fact
  now, filed the way facts get filed in this room — no ceremony for a finished thing, just the plain
  arithmetic of one less than there was an hour ago.


  Smoke goes up thin. Breaks apart before it reaches anything.


  Across the berth, Tetsu's hand moves. Two inches, no more, toward the inside of his coat — the
  place where something small and square-edged has ridden against his ribs all night — and stops
  there, same as it's stopped three times already. Fingers press once through the fabric. Feel the
  shape of the thing. Come back to his knee.


  He doesn't look at what he almost reached for.


  Mireille has the ledger open across her knee. Not writing. Looking at the last line — weight,
  distance, angle, no name — the way you look at a number you've already decided not to argue with
  tonight.


  She closes the cover. Pencil still inside it this time, caught between the pages, and she doesn't
  fish it back out.


  Water keeps finding the same line down the glass, over and over, patient in a way that isn't a
  metaphor for anything. It's just weather. Scheduled, budgeted, indifferent.


  Nobody talks for a while. Long enough that the quiet stops being a held thing and turns into
  furniture — something the room simply has now, the way it has a table and a window and three
  people too spent to spend words on each other.


  You watch the coal instead of the smoke. Small orange point going smaller. Think, without meaning
  to, that the flame held steady and that it shouldn't have, not after tonight, not with hands that
  did what these did.


  A knock. Two knuckles, once, low on the frame.


  Tetsu's up before the second one lands. Opens the hatch on the same wet dark from before, and it
  isn't the boy this time, isn't the vendor — just a gloved hand, holding out a thin envelope
  through the gap, gone again before the door's shut the rest of the way. No face attached to it
  worth remembering.


  He sets it on the table. Doesn't open it. Doesn't hand it to anyone.


  Mireille looks at it a long moment. Then reaches over, without asking, and opens the ledger back
  to a fresh page — blank, waiting, weight and distance and angle not yet filled in because there's
  nothing yet to fill them with.


  She leaves the line empty.


  Sets the pencil across it, not writing, just resting there — ready.
