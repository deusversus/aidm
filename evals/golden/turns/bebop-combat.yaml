      The signal was received. Story advances cleanly because the player earned this moment through
      roleplay, not dice luck. The silence speaks. The ledger closes. Departure is imminent. This is
      success, and it costs nothing, because routine mastery never does—especially when that routine
      is the hinge of an operation about to turn irrevocably forward.
