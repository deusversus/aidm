      SIGNAL between operatives (+5), yields 21. Success. The match catches. The cigarette ignites.
      Mireille reads it. The scene resolves with the weight of preparation behind it. No cost. No
      complication. Just the quiet authority of someone who knows exactly what they are doing and
      lets the world catch up to their certainty—except here, certainty is the action itself. The
