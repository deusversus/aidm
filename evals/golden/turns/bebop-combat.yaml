prose: >-
  You had Wren's collar before you finished the thought that started the reach — fingers hooking
  into wet canvas and worn wool, weight following where your hand led it because that's what weight
  does when the body underneath offers no argument. You didn't ask first. Asking costs a beat you
  didn't have; whatever was coming through what used to be your firing lane wasn't waiting on
  manners.


  Wren came.


  Not fought, not helped — came, the particular non-weight of someone who has already decided,
  somewhere below deciding, that resistance and cooperation cost the same and neither's worth the
  spending. You felt it the moment your shoulder took the drag: no lean into you, no counter-lean
  away. A door swinging on hinges oiled a long time ago for exactly this kind of night. You'd pulled
  people out of worse rooms. None of them had ever gone this quiet about it.


  Backward, past the ladder. Rust-streaked rung, the same red stencil at its base you'd clocked once
  already and not touched — and you didn't touch it now either, because the last four seconds had
  already spent that option without asking your permission. The Sash men were down, or gone the way
  the third one went, taking his unfinished sentence with him. The gantry stood open where you used
  to be standing. Then it stood beside you. Then behind. Turning your back on a dark that had just
  started moving with intent was the one motion tonight your body refused to authorize, ladder or no
  ladder.


  You went sideways instead, into a gap your shoulder found before your eyes did — a crate-stack
  pocket, the kind a dock keeps for its own reasons and never puts on a manifest. Wren folded into
  it after you like cloth already used to folding.


  No sirens climbed the pier wall behind you. No footsteps retreated in either direction — whoever
  of the Sash had survived didn't run so much as evaporate, leaving no sound behind them at all, as
  if being heard leaving cost more than they had left to spend. The alley kept its silence the way
  it kept everything else tonight: on its own schedule, not yours.


  Del came in low a half-step after, breath ragged, no joke riding under it, none left to ride.
  "Ladder's gone," Del said — flat, more report than complaint, the family trade half-spoken, the
  other half swallowed. Didn't say *I could've taken it.* Didn't have to. That was the stone Del was
  carrying now, the one to be picked back up later, somewhere safer, if somewhere safer ever came
  around again.


  The dark took its own time deciding what to do with the three of you crammed inside it.


  It was wrong dark the way all of tonight had been wrong — sound arriving late, shapes arriving
  early — but this pocket spoke its own dialect of it. The floor under your boots didn't sit level.
  Not tilted enough to name. Just enough that your knees kept a private argument with the planking
  your head hadn't been invited to. Somewhere under that floor, not beside you, not ahead — *under*
  — something shifted, slow and patient, the sound of it arriving a full breath after whatever
  caused it, same as everything tonight: late, apologetic, wrong.


  Wren turned their head. Once. Back toward the gap you'd all just come through, the red stencil
  catching one last scrap of light before the dark closed the distance for good. Something crossed
  their face that wasn't fear and wasn't relief. Recognition, settled, old — the sentence they'd
  been not-finishing all night, finished now without a single word spent on it: *I know what's down
  here because I've been down here, and neither of us is climbing back out on a ladder that isn't
  ours to use anymore.*


  Then they faced forward again, into the new dark, and waited — same as you, same as Del — to learn
  what the floor was going to do next.
