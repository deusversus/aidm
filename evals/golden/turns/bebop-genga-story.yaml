prose: >-
  Rain.


  She doesn't say anything.


  Smoke goes up. Doesn't say anything either.


  Tetsu's jaw works. The wrapped thing sits face-down on his knee, and his hand doesn't go near it,
  doesn't go near the coat, doesn't go near the holster this time. Just sits.


  He looks at the window. Dark now. Has been dark an hour.


  "Wasn't a job," he says.


  Three words. He doesn't add to them right away, and she doesn't fill the gap he leaves — lets it
  sit the way she's let everything sit tonight, because filling it would cost her the thing she's
  spent all night buying.


  Mireille's pencil doesn't move. But her eyes come up off the ledger.


  "Eighty-six," Tetsu says, "was never the number for this. That's the number I owe out. Different
  column." He looks at the wrapped cloth on his knee like it might answer for him. "This was
  supposed to clear it."


  Nobody asks clear what.


  "Bought the job three weeks back. Not took. Bought." He says it flat, the way he says everything
  now, but there's a crack under the flat that wasn't there an hour ago. "Told the broker I'd cover
  Mireille's cut too, quiet, so she wouldn't have to ask."


  Mireille's face doesn't move. Something behind it does.


  "You didn't tell her," the lead says. Not a question.


  "No."


  Rain finds the glass. Same seam. No new information in it.


  Tetsu picks the wrapped thing up off his knee. Doesn't unwrap it. Sets it on the table instead,
  between the envelope and the closed ledger, three objects now where there'd been one.


  "That's not for me," he says again. Same words as before. This time nobody lets it pass.
