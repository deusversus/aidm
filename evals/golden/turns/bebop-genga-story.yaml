prose: >-
  The calculation happened before you noticed you were making it. That was the professional part of
  you, the part that had spent enough nights on this pier to know the difference between a fight you
  could win and a fight you could only survive: you couldn't out-wait a thing that had already
  decided not to blink. You could, maybe, out-know a man who had.


  You didn't draw. You didn't step forward, either. You turned — slow, the same unhurried grammar as
  the cigarette, as the hand on the grip — and put your back to the dark for exactly as long as it
  took to find Hoshi's silhouette still framed in the gap, stacking his last stool with the studied
  indifference of a man who had learned that some suppers end badly and some don't, and the trick
  was never showing which one you expected.


  "The Red Sash runs these piers," you said. Flat. Not a question, not bait dressed as one — a fact
  laid on the counter the way Fen had left his money, exact, no change expected. You watched him for
  the flinch.


  It came small. A hitch in the stacking, a half-second where the stool didn't quite land square,
  and something behind his eyes recalculated you from scratch — desperate bounty hunter revised
  upward into someone who'd done homework, someone worth the truth instead of the shrug. He set the
  stool down properly this time. "You know that," he said, "and you're still standing in my light
  asking me things instead of the men who'd actually hurt you for asking them. That tells me
  something too."


  "Tell me who answers to them. On this pier. Tonight."


  Hoshi looked past you, once, toward the black beyond the tarp — not long, not obvious, but you
  caught it, the same instinct that had made you notice the gap in the first place. He wasn't
  looking at Wren. He was looking at whatever Wren was looking at, and something in his face said he
  already knew its shape, or at least its neighborhood.


  "There's a foreman," he said, quieter now, the words coming like a man paying a debt he'd rather
  not have owed. "Runs collections for the Sash out of the container stacks past the fish market.
  Name's Corda. If Fen skipped without his change, it's because Corda's people were already walking
  toward him, and a man doesn't stop to count coins when that happens." He picked up the last stool,
  held it instead of stacking it, an old man's hands finding something to do with the fear his voice
  wouldn't carry. "That's what I've got. It's more than I've given anyone in a year. Don't make me
  regret the arithmetic."


  Behind you, Del exhaled like the sound itself was a relief — a name, a person, a thing you could
  walk up to and shoot at if it came to that, instead of whatever waited past the tarp with no shape
  and no mercy. "Corda," he repeated, testing the word the way he used to test jokes, checking if it
  would hold weight. It held. He didn't make it funny. You noticed that more than anything else he'd
  done all night — Del, who joked at cold noodles, saying a stranger's name like a man setting down
  a stone he intended to pick back up later, somewhere safer.


  Wren hadn't turned. Wren was still facing the dark, shoulders set in that rigid, borrowed
  stillness, and when they spoke it came sideways, not to you, not quite to Hoshi either. "Corda
  doesn't come down here himself," Wren said. "Men like that never do their own walking in the
  dark." A pause, weighted with whatever room Wren had once stood in and never finished telling you
  about. "Which means somebody else did. Which means what's back there answers to somebody too."


  Hoshi didn't argue. He picked up his last two stools, one in each hand, and didn't offer anything
  further — the wall of his routine finished, the door of him closed again, the way a man closes a
  door he's opened wider than he meant to.


  You had a name now. You had a direction that led away from the dark, toward daylight logic —
  foremen, collections, hierarchies you could climb and burn. And you had a shape still watching
  from twelve feet of black that hadn't moved, hadn't blinked, and hadn't yet decided which one of
  you it wanted first.


  Corda would keep till morning. The thing behind Wren might not.
