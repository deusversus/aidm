      - "Melancholy carries even the comedy."
    example_voice: |
      He lit a cigarette. The ash fell too fast — the way it always did on Mars. Somewhere
      a saxophone started up, late and too slow, and Spike listened the way a man listens
      when he's already decided to walk into something.

