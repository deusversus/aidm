      signature_phrases:
        - "Edward!"
      dialogue_rhythm: "Unpredictable bursts."
      emotional_expression: "Direct"

  author_voice:
    sentence_patterns:
      - "Short declarative punches during action."
      - "Long drifting sentences during introspection, often ending on trailing ellipses."
      - "Environmental beats used as emotional substitution — the cigarette, the rain, the jazz."
    structural_motifs:
      - "Cold opens with disconnected imagery."
      - "Flashback intrusions mid-scene."
      - "Jazz track as episode title AND emotional anchor."
    dialogue_quirks:
