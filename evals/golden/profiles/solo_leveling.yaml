ip_mechanics:
  power_system:
    name: "Hunter System"
    mechanics: |
      Hunters are awakened humans who can enter gates (portals to other
      dimensions) and fight monsters. Ranked E through S by the Awakening
      System. Jin-Woo gains a unique System that lets him level infinitely,
      shadow-extract defeated enemies, and access job change quests. Stats
      (STR/AGI/VIT/INT/SENSE) increase via quest rewards and level-ups; free
      points can be allocated.
    limitations: |
      Mana regeneration is bounded. Shadow army has capacity limits.
      Penalty quests carry lethal failure consequences. Jin-Woo's System
      is unique among hunters — it cannot be replicated.
    tiers:
      - "E-Rank (lowest)"
      - "D-Rank"
      - "C-Rank"
      - "B-Rank"
      - "A-Rank"
      - "S-Rank"
      - "National-Level (rarest)"
      - "Monarch-tier (post-System)"

