# Scoring by jcettison + Claude, 2026-04-19.
# Notable: exercises canonical_stat_mapping — the crown jewel of the IP-mechanics schema.
# Solo Leveling's Hunter System shows STR/AGI/VIT/INT/SENSE as on-screen stats plus LUK as a
# meta-resource. This maps cleanly to D&D's STR/DEX/CON/INT/WIS with CHA hidden.

