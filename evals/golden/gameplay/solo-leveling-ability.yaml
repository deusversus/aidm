  min_length_chars: 200
  max_length_chars: 3000

manual_rubric:
  register:
    - shadow-monarch register
    - quiet command
    - weight of ritual
  tone_anchors:
    - shadow rising from floor
    - knight-form iconography
  forbidden_patterns:
