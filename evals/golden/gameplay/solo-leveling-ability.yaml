    S-rank hunter, Shadow Monarch. Unique among Hunters — the System
    only leveled him. Quiet. Not smug about it.
  power_tier: T2
  sheet:
    available: true
    name: Sung Jinwoo
    power_tier: T2
    stats:
      STR: 22
      DEX: 20
      CON: 18
      INT: 16
      WIS: 14
      CHA: 12
    abilities:
