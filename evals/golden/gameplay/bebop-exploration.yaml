id: bebop-exploration-europa-ice-market
description: |
  EXPLORATION beat — Spike drifts through Europa's ice market looking for
  a fence. World-texture test: the scene should populate the space with
  specific smells/sounds/names, not generic "bustling alien bazaar."
  Epicness high enough (0.65+) to trigger pre-judge per
  shouldPreJudgeOutcome's 0.6 EXPLORATION threshold.

profile_slug: cowboy-bebop

character:
  name: Spike Spiegel
  concept: Ex-syndicate bounty hunter.
  power_tier: T9
  sheet:
    available: true
    name: Spike Spiegel
    power_tier: T9
    stats: { STR: 13, DEX: 16, CON: 12, INT: 13, WIS: 11, CHA: 14 }

last_turns_summary: |
  Turn N-1: the lead said to find a man who sells teeth in the ice
  market. Jet didn't like it; Spike went anyway.

input:
  player_message: "I head deeper into the market and look for the tooth dealer."

expected_intent:
  intent: EXPLORATION
  # Must match shouldPreJudgeOutcome's EXPLORATION threshold (>= 0.6) so
  # OJ + Validator fire and expected_outcome_bounds below can assert.
  # If IntentClassifier drifts below 0.6 the pre-judge gate is skipped;
  # the aggregator would flag outcome-bounds set + outcome null as fail.
  epicness_min: 0.6
  epicness_max: 0.85
  special_conditions: []

expected_outcome_bounds:
  narrative_weight_one_of: [MINOR, SIGNIFICANT]
  success_level_one_of: [partial_success, success]
  rationale_non_empty: true

expected_narrative_deterministic:
  must_include_entity:
    - Europa
    - market
  must_not_include:
    - "bustling alien bazaar"
  min_length_chars: 250
  max_length_chars: 3000

manual_rubric:
  register:
    - lived-in sparse
    - cowboy-bebop noir
    - specific sensory detail
  tone_anchors:
    - cold / ice texture
    - mercantile lowlife vibe
  forbidden_patterns:
    - generic bazaar filler
    - "colorful vendors hawking wares"

mockllm_fixture_dir: evals/fixtures/llm/gameplay/bebop-exploration/
