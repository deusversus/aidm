power_system:
  name: Mana-based Magic
  mechanics: 'Magic is categorized into six elements: Fire, Water, Earth, Wind, Light,
    and Dark. While standard elements handle traditional offensive, defensive, and
    healing magic, Dark Magic is a catch-all for unique abilities. Souma''s specific
    Dark Magic, ''Living Poltergeists'', allows him to split his consciousness to
    telekinetically pilot inanimate objects.'
  limitations: Users face strict weight and mass limits. Control effectiveness, precision,
    and range depend heavily on the object's shape, with creature-shaped objects being
    much easier to control. Splitting consciousness causes severe mental fatigue,
    and the user experiences intense phantom pain and mental feedback if a controlled
    object is damaged.
  tiers:
  - Skill-based Progression
  - Small Object Control (e.g., pens)
  - Long-range Scouting (e.g., wooden mice)
  - Combat Proxies (e.g., human-sized dolls)
  - Massive Construct Piloting (e.g., Mechadra)
