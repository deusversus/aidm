power_system:
  name: Mana / Awakening System
  mechanics: A small percentage of humanity undergoes an 'Awakening' by absorbing
    ambient mana, granting them superhuman physical abilities, magical powers, and
    accelerated healing. Awakened beings (Hunters) are naturally predisposed to specific
    classes like Fighters, Mages, Assassins, or Healers. The protagonist, Sung Jinwoo,
    uniquely utilizes 'The System', an RPG-like magical interface that allows him
    to level up, allocate stat points, and wield god-tier necromancy as the Shadow
    Monarch.
  limitations: 'The most crucial rule is ''Fixed Potential'': for 99.9% of Hunters,
    their mana capacity and physical limits are permanently set upon Awakening and
    cannot be increased through training or combat. Sung Jinwoo''s unique ''System''
    enforces daily physical quests with severe survival penalties for failure, and
    his Shadow Extraction ability is limited to three attempts per corpse. Additionally,
    cosmic beings (Rulers and Monarchs) cannot manifest their true bodies on Earth
    and must possess human vessels.'
