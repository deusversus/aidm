exemplars:
  - id: continuity_b1_kino
    axis: continuity
    band: 1
    anchor_show: Kino's Journey
    author: claude-fable-5
    method: synthesized
    text: >-
      The country of the Weighed Word required every citizen to carry a
      ledger of everything they had ever said. The traveler stayed the
      customary three days. She watched a man read his own ledger in the
      plaza, weeping at page four hundred; she ate a fine supper with the
      customs officer, who spoke only in questions; she declined,
      politely, the gift of a blank ledger of her own. On the third
      morning she oiled the motorrad, paid the exit toll, and rode out
      through the northern gate. The road ahead held another country,
      which would have another custom, which would ask nothing of this
      one. Behind her the gates closed on the ledgers and the weeping
      man, complete, requiring no sequel. The road did not remember. That
      was the road's kindness.
  - id: continuity_b9_vinland
    axis: continuity
    band: 9
    anchor_show: Vinland Saga
    author: claude-fable-5
    method: synthesized
    text: >-
      The field still had last year's war in it. His plough turned up a
      rusted spearhead before noon and he set it on the wall without a
      word, next to the buckle from spring and the boy's knife from before
      that. Every furrow paid an old debt: the burned farm had bought the
      winter hunger, the hunger bought the master's loan, the loan bought
      this field, and the field would buy back — one harvest a year — the
      years he did not talk about. His shoulder ached where the old wound
      sat. It ached in planting season and it ached in raiding season, and
      it did not know the difference yet. That was the work: teaching it
      one. He stacked the stones until dark. Next year began there, in
      this year's aching.
