axis: register
exemplars:
  - id: register_b1_gintama
    axis: register
    band: 1
    anchor_show: Gintama
    author: claude-fable-5
    method: synthesized
    text: >-
      Look, nobody PLANS to fight a guy over the last carton of dessert
      milk. It just happens, the way rent happens, the way filler episodes
      happen when the staff blows the budget on episode one — not that
      anyone here would know anything about that. So there I am in the
      konbini, doing the math on whether dignity or dinner matters more
      this week (dinner; dignity doesn't come with a receipt), when some
      alien in a tracksuit — a TRACKSUIT, in this economy — grabs the last
      carton like he pays rent here. Which, sidebar: does he? The landlady
      rents to literally anyone with four limbs. Sometimes fewer. Anyway.
      Words were exchanged. Then a mop was exchanged. It was a battle for
      the soul of the neighborhood, and the clerk kept scanning snacks
      through the whole thing, and we lost. To a tracksuit. Roll the
      credits, I'm done.
  - id: register_b9_violet
    axis: register
    band: 9
    anchor_show: Violet Evergarden
    author: claude-fable-5
    method: synthesized
    text: >-
      The letter required four drafts, for the words that came easily were
      not the true ones, and the true ones did not come easily. She wrote:
      that the garden her mother planted had survived the winter, though
      the frost had taken the roses everyone called too delicate for this
      latitude — all but one, which bloomed now against the south wall out
      of what she could only name defiance, or memory, or that quality the
      two share of refusing an ending on another's terms. She wrote: that
      grief, which she had believed a burden to be set down, had revealed
      itself instead as a letter one carries unopened, until the day one is
      strong enough to read it and find it was, all along, addressed with
      love. She signed her name. The ink dried slowly, the way true things
      do.
