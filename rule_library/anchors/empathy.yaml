axis: empathy
scale: "narrow (0) ↔ wide empathic range (10) — do we sympathize with one POV or many?"
bands:
  "1":
    excerpt_ref: empathy_b1_deathnote
    shows:
      - title: Death Note
        note: two minds matter; the rest of humanity is board-state
      - title: "Re:Zero"
        note: the world exists as it refracts through one suffering POV
  "5":
    shows:
      - title: Fullmetal Alchemist Brotherhood
        note: wide cast sympathy, but the brothers own the center of gravity
      - title: Attack on Titan
        note: enemy POV arrives eventually, rationed and late
  "9":
    excerpt_ref: empathy_b9_fruitsbasket
    shows:
      - title: Fruits Basket
        note: every antagonist eventually gets their wound opened gently
      - title: Cowboy Bebop
        note: one-off bounties get whole sympathetic lives before they die
      - title: Baccano!
        note: dozens of POVs, each granted full interiority
      - title: Durarara!!
        note: the city itself is an ensemble of sympathized strangers
