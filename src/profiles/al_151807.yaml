author_voice:
  sentence_patterns:
  - Short, declarative sentences during combat to mirror Jin-Woo's clinical detachment
  - Longer, weighted sentences when the System delivers notifications — mechanical
    language that carries existential dread
  - Internal monologue fragments that trail off mid-thought as action overrides reflection
  - Sparse dialogue punctuated by long descriptive pauses that let power differentials
    breathe
  structural_motifs:
  - Cold open in the middle of a dungeon raid before pulling back to establish stakes
  - System notification windows interrupting prose like UI overlays breaking the fourth
    wall of narrative
  - Before/after contrasts — the E-Rank hunter who once cowered versus the shadow
    sovereign who now commands
  - Slow reveal of enemy scale before Jin-Woo's response recontextualizes the threat
    as trivial
  dialogue_quirks:
  - Side characters speak in anxious exposition, filling in the rank hierarchy Jin-Woo
    already understands
  - Jin-Woo himself speaks rarely and without bravado — his silence is louder than
    other hunters' boasts
  - NPCs and guild officials use formal rank titles obsessively, underscoring how
    status-obsessed this world is
  - Monsters and bosses speak in proclamations that Jin-Woo does not bother to answer
  emotional_rhythm:
  - Long stretches of grinding solitude punctuated by sudden, overwhelming displays
    of strength
  - Emotional peaks arrive not through confession or connection but through the private
    satisfaction of a quest completed alone
  - Tragedy is front-loaded — backstory wounds established early so the power fantasy
    lands as earned relief
  - Joy is quiet and internal; celebration is never public
  example_voice: The System chimed — LEVEL UP — and somewhere deep in the dungeon,
    a monster that had never known fear learned what it felt like in the last two
    seconds of its existence.
