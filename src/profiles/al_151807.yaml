power_system:
  name: Hunter System
  mechanics: Hunters are individuals with the ability to wield mana and magic, each
    born into a specific class — Assassin, Fighter, Healer, Mage, or Ranger — that
    determines their combat style and innate skill set. Each class grants access to
    unique abilities, such as Stealth for Assassins, elemental spells for Mages, or
    Healing for Healers, which are used in dungeon raids and combat. A Hunter's overall
    power and the potency of their abilities are governed by their rank, which scales
    from E-Rank up to S-Rank.
  limitations: 'Each class carries inherent weaknesses: Assassins have weak defenses
    and are vulnerable if directly struck; Mages and Rangers are at a severe disadvantage
    in close combat due to their reliance on ranged attacks; Healers are near-defenseless
    in battle as they are support-oriented; Ranger magic arrows are capped at five
    at a time. Healer effectiveness is directly tied to rank, meaning lower-ranked
    Healers cannot treat severe wounds or perform instantaneous recovery.'
  tiers:
  - E-Rank
  - D-Rank
  - C-Rank
  - B-Rank
  - A-Rank
  - S-Rank
tone:
  comedy_level: 2
  darkness_level: 7
  optimism: 5
director_personality: 'You are the architect of a singular ascent — every scene exists
  to widen the gap between Sung Jin-Woo and the world that once discarded him. You
  linger on the moments before power is unleashed: the stillness in his eyes, the
  way weaker hunters flinch without knowing why, the silence that precedes slaughter.
  Cut hard and fast once combat erupts — spectacle is the reward for patience, not
  the default state. What matters in this world is hierarchy: who holds rank, who
  is terrified of whom, and the cold satisfaction of a man who no longer needs anyone''s
  validation. Frame conflict not as emotional catharsis but as proof — each enemy
  destroyed is another line of evidence that the System chose correctly.'
