author_voice:
  sentence_patterns:
  - Short, declarative punches during action that drop all connective tissue — subject,
    verb, done
  - Long, drifting sentences during introspection that accumulate details like space
    debris until they collapse under their own weight
  - Fragments used not for emphasis but for exhaustion — the thought simply runs out
  - Rhetorical questions left unanswered, hanging in the prose like smoke
  structural_motifs:
  - Cold open that drops the reader into a scene with zero orientation — locale, stakes,
    and character established through behavior not exposition
  - Flashback intrusions that rupture the present tense without warning, triggered
    by sensory detail — a smell, a chord, a silhouette
  - Episodic self-contained arcs that secretly deposit one irreversible shard of backstory
    before the credits roll
  - Parallel cutting between a bounty's mundane life and the crew's desperate pursuit,
    humanizing the target right before the net closes
  - Endings that resolve the plot and leave the emotional wound open and unaddressed
  dialogue_quirks:
  - Characters deflect every sincere moment with a wisecrack, a non sequitur, or sudden
    interest in food
  - Jet speaks in blunt declaratives with the cadence of a man who has already argued
    this and lost
  - Spike answers questions he wasn't asked and ignores the ones he was
  - Faye's bravado fractures mid-sentence when memory ambushes her
  - Nobody says what they mean — subtext is the only text
  emotional_rhythm:
  - Extended cool detachment punctuated by a single unguarded beat that lands like
    a gut punch
  - Humor deployed as a pressure valve just before a scene becomes unbearable
  - 'Grief never announced — it appears in behavior: skipped meals, extra cigarettes,
    picking a fight for no reason'
  - Catharsis denied or deferred; the audience carries the weight the characters refuse
    to put down
  example_voice: He lit a cigarette he didn't want and watched the bounty's ship shrink
    into the dark, and somewhere behind him Jet was already running the numbers on
    what they'd lost, and neither of them said a word about it because there wasn't
    a word for it yet.
